<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Nunito+Sans:ital,opsz,wght@0,6..12,300;0,6..12,400;0,6..12,600;0,6..12,700;1,6..12,400&display=swap" rel="stylesheet">

<!-- Email obfuscation: hide from crawlers, assemble for real users -->
<style>.pk-at { font-size: 0; }</style>
<script>
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.pk-email').forEach(function(el) {
    var u = el.getAttribute('data-u');
    var d = el.getAttribute('data-d');
    if (u && d) {
      var addr = u + '@' + d;
      el.href = 'mailto:' + addr;
      el.textContent = addr;
    }
  });
});
</script>
