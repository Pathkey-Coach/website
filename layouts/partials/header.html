{{ if .Site.Params.analytics.googleTagManager.enabled }}
<noscript>
  <iframe
    src="https://www.googletagmanager.com/ns.html?id={{ .Site.Params.analytics.googleTagManager.code }}"
    height="0"
    width="0"
    style="display: none; visibility: hidden">
  </iframe>
</noscript>
{{ end }}

{{ partial "skip-to-content.html" }}

<header class="header fixed-top" id="header">
  <div class="container">
    <nav class="navbar bd-navbar navbar-expand-lg navbar-light p-0" role="navigation" aria-label='{{ i18n "primary_navigation" }}'>
      <div class="container-fluid">
        <a class="navbar-brand mx-auto" href="{{ .Site.BaseURL | relLangURL }}">
          {{ if .Site.Params.logo }}
          <img
            src="{{ .Site.Params.logo | absURL }}"
            alt="{{ i18n "logo_alt" }}"
            class="logo" />
          {{ end }}
          <span>{{ i18n "logo_text1" }}</span>
          <span>{{ i18n "logo_text2" }}</span>
        </a>
        <button
          class="navbar-toggler collapsed"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label='{{ i18n "toggle_navigation" }}'>
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav ml-lg-auto align-items-center">
            {{- range .Site.Menus.header }}
            <li class="nav-item">
              <a data-scroll class="nav-link" href="{{ .URL | relURL }}">{{ .Name | upper }}</a>
            </li>
            {{- end }}
          </ul>
        </div>
      </div>
    </nav>
  </div>
</header>
