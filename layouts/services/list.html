{{ define "main" }}

<div class="pk-page-header">
  <h1>{{ .Title }}</h1>
  <p class="pk-subtitle">{{ .Params.intro }}</p>
</div>

<div class="container" style="max-width: 780px;">
  {{ range .Params.services }}
  <div class="pk-service-detail">
    <h2>{{ .title }}</h2>
    <p class="pk-description">{{ .description }}</p>
    <p class="pk-audience">{{ .audience }}</p>
  </div>
  {{ end }}
</div>

<div class="pk-page-cta">
  <a href="{{ .Params.cta_url }}" class="btn btn-primary">{{ .Params.cta_text }} →</a>
</div>

{{ end }}
