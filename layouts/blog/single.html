{{ define "main" }}
{{ with .Params.link }}
  <meta http-equiv="refresh" content="0; url={{ . }}" />
  <script>window.location.href = "{{ . }}";</script>
  <p>Redirecting to <a href="{{ . }}">{{ . }}</a>...</p>
{{ else }}
  <article class="blog-post">
    <h1>{{ .Title }}</h1>
    <div>{{ .Content }}</div>
  </article>
{{ end }}
{{ end }}
