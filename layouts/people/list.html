{{ define "main" }}

<div class="pk-page-header">
  <h1>{{ .Title }}</h1>
  <p class="pk-subtitle">{{ .Params.intro }}</p>
</div>

<div class="container" style="max-width: 960px;">

  <!-- Partner Cards -->
  <div class="pk-partners-grid">
    {{ range .Params.partners }}
    <div class="pk-partner-card">
      <div class="pk-partner-image">
        <img src="{{ .image | relURL }}" alt="{{ .name }}" loading="lazy" />
      </div>
      <h3>{{ .name }}</h3>
      <p class="pk-partner-role">{{ .role }}</p>
      {{ with .bio }}<p class="pk-partner-bio">{{ . }}</p>{{ end }}
      <div class="pk-partner-links">
        <a href="{{ .linkedin }}" target="_blank" class="pk-social-link">LinkedIn ↗</a>
      </div>
    </div>
    {{ end }}
  </div>

  <!-- Link to The Patkis -->
  {{ with .Params.patkis_cta }}
  <a href="{{ "the-patkis/" | relURL }}" class="pk-patkis-link-card">
    {{ . }}
  </a>
  {{ end }}

</div>

{{ end }}
