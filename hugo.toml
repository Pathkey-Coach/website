baseURL = "https://pathkey-coach.github.io/website/"
title = "Pathkey | AI Advisory & Enablement for Founders"
languageCode = "en"
theme = "adritian-free-hugo-theme"

[pagination]
pagerSize = 6

[outputs]
  page = ["HTML"]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]
  footer = []

[taxonomies]
  tag = "tags"
  category = "categories"
  author = "authors"

disableKinds = ["footerSection"]

## Base mounts
[[module.mounts]]
source = "archetypes"
target = "archetypes"

[[module.mounts]]
source = "assets"
target = "assets"

[[module.mounts]]
source = "i18n"
target = "i18n"

[[module.mounts]]
source = "layouts"
target = "layouts"

[[module.mounts]]
source = "static"
target = "static"

[[module.mounts]]
source = "node_modules/bootstrap/scss"
target = "assets/scss/bootstrap"

[[module.mounts]]
source = "node_modules/bootstrap/dist/js"
target = "assets/js/bootstrap"

[[module.mounts]]
source = "node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"
target = "assets/js/vendor/bootstrap.bundle.min.js"

[[module.mounts]]
source = "node_modules/bootstrap-print-css/css/bootstrap-print.css"
target = "assets/css/bootstrap-print.css"

[params]
title = "Pathkey – AI Advisory & Enablement"
description = "Pathkey partners with founders and decision-makers to turn AI ambition into execution. Strategy, implementation, enablement — whatever moves the needle."
themeColor = "#2c3e2d"
images = ["/images/pathkey_logo_transparent.png"]

[params.seo]
siteName = "Pathkey"
siteDescription = "Pathkey partners with founders and decision-makers to turn AI ambition into execution. Strategy, implementation, enablement — whatever moves the needle."
siteImage = "/images/pathkey_logo_transparent.png"

[params.seo.person]
name = "Pathkey"
url = "https://pathkey-coach.github.io/"
sameAs = ["https://www.linkedin.com/in/suyogpatki", "https://www.linkedin.com/in/avanipatki"]

# Logo in header
# logo = "/images/pathkey_logo_transparent.png"

homepageExperienceCount = 6

[params.colorTheme]
[params.colorTheme.auto]
  disable = true
[params.colorTheme.forced]
  theme = "light"

[params.colorTheme.selector.disable]
footer = true
header = true
mobileHeader = true

[params.languages.selector.disable]
footer = true
header = true
mobileHeader = true

[params.blog]
layout = "sidebar-right"
sidebarWidth = "25"
narrowContent = true
showCategories = true
showRecentPosts = true
recentPostCount = 5
listStyle = "summary"
listLayout = "cards"

[params.plugins]

[[params.plugins.css]]
URL = "css/pathkey.css"
[[params.plugins.css]]
URL = "css/custom.css"
[[params.plugins.css]]
URL = "css/adritian-icons.css"
[[params.plugins.css]]
URL = "css/bootstrap-print.css"

[[params.plugins.js]]
URL = "js/rad-animations.js"
[[params.plugins.js]]
URL = "js/sticky-header.js"
[[params.plugins.js]]
URL = "js/library/fontfaceobserver.js"

[[params.plugins.scss]]
URL = "scss/adritian.scss"

[languages]
[languages.en]
disabled = false
languageCode = "en"
languageDirection = "ltr"
languageName = "English"
